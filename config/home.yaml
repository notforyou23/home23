      model: grok-4-0709
    grok4:
      provider: xai
      model: grok-4-0709
    kimi:
      provider: ollama-cloud
      model: kimi-k2.6
    kimi-k2.6:
      provider: ollama-cloud
      model: kimi-k2.6
    qwen:
      provider: ollama-cloud
      model: qwen3.5:397b
    deepseek:
      provider: ollama-cloud
      model: deepseek-v3.2
    minimax:
      provider: minimax
      model: MiniMax-M2.7
    nemotron:
      provider: ollama-cloud
      model: nemotron-3-super
    mistral:
      provider: ollama-cloud
      model: mistral-large-3:675b
    qwen-coder:
      provider: ollama-cloud
      model: qwen3-coder:480b
    devstral:
      provider: ollama-cloud
      model: devstral-2:123b
    gemma4:
      provider: ollama-cloud
      model: gemma4:31b
    gemma:
      provider: ollama-cloud
      model: gemma4:31b
    glm:
