home:
  name: home23-dev
  version: 0.1.0
  primaryAgent: jerry
evobrew:
  port: 3415
cosmo23:
  ports:
    app: 43210
    websocket: 43240
    dashboard: 43244
    mcp: 43247
dashboard:
  vibe:
    autoGenerate: true
    generationIntervalHours: 1
    rotationIntervalSeconds: 120
    galleryLimit: 600
    sourcePaths:
      - /Volumes/Casey Jones/_cosmoImages/images
  tiles:
    version: 1
    homeLayout:
      - tileId: thought-feed
        enabled: true
        size: third
      - tileId: vibe
        enabled: true
        size: third
      - tileId: chat
        enabled: true
        size: third
      - tileId: outside-weather
        enabled: true
        size: half
      - tileId: sauna-control
        enabled: true
        size: half
      - tileId: system-summary
        enabled: true
        size: full
      - tileId: brain-log
        enabled: true
        size: half
      - tileId: dream-log
        enabled: true
        size: half
      - tileId: feeder
        enabled: true
        size: full
    customTiles:
      - id: outside-weather
        kind: custom
        title: Outside
        icon: 🌤
        mode: ecowitt-weather
        connectionId: jtr-ecowitt
        refreshMs: 60000
        sizeDefault: half
        config: {}
      - id: sauna-control
        kind: custom
        title: Sauna
        icon: ♨️
        mode: huum-sauna
        connectionId: jtr-huum
        refreshMs: 15000
        sizeDefault: half
        config:
          startDefaults:
            targetTemperature: 190
            duration: 180
providers:
  ollama-cloud:
    baseUrl: https://ollama.com/v1
    defaultModels:
      - kimi-k2.6
      - gemma4:31b
      - glm-5.1
      - qwen3.5:397b
      - deepseek-v3.2
      - nemotron-3-super
  ollama-local:
    baseUrl: http://127.0.0.1:11434
  anthropic:
    defaultModels:
      - claude-sonnet-4-6
      - claude-opus-4-7
      - claude-opus-4-6
  openai:
    defaultModels:
      - gpt-5.4-mini
  openai-codex:
    defaultModels:
      - gpt-5.4
  minimax:
    baseUrl: https://api.minimax.io/anthropic
    defaultModels:
      - MiniMax-M2.7
      - MiniMax-M2.7-highspeed
      - MiniMax-M2.5
      - MiniMax-M2.5-highspeed
  xai:
    baseUrl: https://api.x.ai/v1
    defaultModels:
      - grok-4-0709
      - grok-4.20-reasoning-latest
      - grok-4.20-non-reasoning-latest
      - grok-4.20-multi-agent-latest
embeddings:
  providers:
    - provider: ollama-local
      model: nomic-embed-text
      endpoint: http://127.0.0.1:11434/api/embeddings
      dimensions: 768
    - provider: openai
      model: text-embedding-3-small
      dimensions: 1536
    - provider: ollama-cloud
      model: nomic-embed-text
      dimensions: 768
chat:
  defaultProvider: minimax
  defaultModel: MiniMax-M2.7
  maxTokens: 4096
  temperature: 0.7
  historyBudget: 400000
  sessionGapMs: 1800000
situationalAwareness:
  bootstrap:
    reads:
      - NOW.md
      - PLAYBOOK.md
osEngine:
  channels:
    machine:  { enabled: false }
    os:       { enabled: false }
    domain:   { enabled: false }
    build:    { enabled: false }
    work:     { enabled: false }
    neighbor: { enabled: false }
  verification:
    flagRequired: true
    zeroContextAsLegal: true
  crystallization:
    backpressure:
      cyclesWithoutReceiptThreshold: 10
    confidenceCaps:
      sensor_primary: 0.95
      sensor_derived: 0.80
      build_event: 0.90
      work_event: 0.90
      neighbor_gossip: 0.70
      zero_context_audit: 0.20
  decay:
    worker:
      cadence: 30m
    halfLife:
      warning_node: 48h
      surreal_transform: 24h
      unfinished_goal_review: 72h
      unreferenced_edge: 30d
  roleIntegrity:
    enforce: false
    rejectLogPath: brain/role-integrity-violations.jsonl
  closer:
    terminationContractRequired: false
    dedupeBeforeSpawn: false
  publish:
    targets:
      workspace_insights: { cadence: 50cycles, path: workspace/insights/ }
      signals:            { cadence: on_verdict_keep }
      bridge_chat:        { salience_threshold: 0.75 }
      dashboard:          { cadence: 5m }
      dream_log:          { cadence: on_critic_keep, path: workspace/dreams/ }
    starvationFloor:
      workspace_insights: 6h
      dashboard: 15m
media:
  imageGeneration:
    provider: openai
    model: gpt-image-1.5
