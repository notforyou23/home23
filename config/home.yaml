home:
  name: home23-dev
  version: 0.1.0
  primaryAgent: jerry
evobrew:
  port: 3415
cosmo23:
  ports:
    app: 43210
    websocket: 43240
    dashboard: 43244
    mcp: 43247
dashboard:
  vibe:
    autoGenerate: true
    generationIntervalHours: 1
    rotationIntervalSeconds: 120
    galleryLimit: 2600
    sourcePaths:
      - /Volumes/Casey Jones/_cosmoImages/images
    dreams:
      enabled: false
      lookback: 3
      extraction: llm
  tiles:
    version: 1
    homeLayout:
      - tileId: outside-weather
        enabled: true
        size: third
      - tileId: vibe
        enabled: true
        size: third
      - tileId: chat
        enabled: true
        size: third
      - tileId: sauna-control
        enabled: true
        size: third
      - tileId: pool-screenlogic
        enabled: true
        size: third
      - tileId: brain-log
        enabled: true
        size: third
      - tileId: system-summary
        enabled: true
        size: half
      - tileId: good-life
        enabled: true
        size: third
      - tileId: dream-log
        enabled: true
        size: half
      - tileId: feeder
        enabled: true
        size: half
    customTiles:
      - id: outside-weather
        kind: custom
        title: Outside
        icon: 🌤
        mode: ecowitt-weather
        connectionId: jtr-ecowitt
        refreshMs: 600000
        sizeDefault: third
        config: {}
      - id: sauna-control
        kind: custom
        title: Sauna
        icon: ♨️
        mode: huum-sauna
        connectionId: jtr-huum
        refreshMs: 15000
        sizeDefault: third
        config:
          startDefaults:
            targetTemperature: 190
            duration: 180
      - id: pool-screenlogic
        kind: custom
        title: Pool
        icon: 🏊
        mode: generic-http-json
        connectionId: jtr-screenlogic
        refreshMs: 30000
        sizeDefault: half
        config:
          request:
            path: /status
            method: GET
          display:
            valuePath: pool.temperatureText
            statusPath: pool.operatingState
            subtitlePath: lights.summary
            metrics:
              - label: RPM
                path: pump.rpm
              - label: Flow
                path: pump.gpm
              - label: Lights
                path: lights.stateText
              - label: Color
                path: lights.colorName
              - label: Salt
                path: chlorinator.saltText
              - label: Chlor %
                path: chlorinator.poolSetPointText
              - label: Cell
                path: chlorinator.stateText
          actions:
            - id: lights-on
              label: 'On'
              method: POST
              path: /circuits/501
              confirmationText: Turn pool lights on?
              fields: []
              bodyTemplate:
                state: 1
            - id: lights-off
              label: 'Off'
              method: POST
              path: /circuits/501
              confirmationText: Turn pool lights off?
              fields: []
              bodyTemplate:
                state: 0
            - id: lights-next
              label: Next
              method: POST
              path: /lights/color
              confirmationText: Cycle pool lights to the next mode?
              fields: []
              bodyTemplate:
                command: 19
            - id: lights-sync
              label: Sync
              method: POST
              path: /lights/color
              confirmationText: Sync pool lights?
              fields: []
              bodyTemplate:
                command: 3
            - id: lights-blue
              label: Blue
              method: POST
              path: /lights/color
              confirmationText: Set pool lights to blue?
              fields: []
              bodyTemplate:
                command: 13
            - id: lights-green
              label: Green
              method: POST
              path: /lights/color
              confirmationText: Set pool lights to green?
              fields: []
              bodyTemplate:
                command: 14
            - id: lights-red
              label: Red
              method: POST
              path: /lights/color
              confirmationText: Set pool lights to red?
              fields: []
              bodyTemplate:
                command: 15
            - id: lights-white
              label: White
              method: POST
              path: /lights/color
              confirmationText: Set pool lights to white?
              fields: []
              bodyTemplate:
                command: 16
            - id: lights-magenta
              label: Magenta
              method: POST
              path: /lights/color
              confirmationText: Set pool lights to magenta?
              fields: []
              bodyTemplate:
                command: 17
screenlogic:
  enabled: true
  host: ''
  adapterPort: 80
  discovery: true
  bridgeHost: 127.0.0.1
  bridgePort: 5023
  pollSeconds: 60
providers:
  ollama-cloud:
    baseUrl: https://ollama.com/v1
    defaultModels:
      - gpt-oss:120b
      - gpt-oss:20b
      - kimi-k2.6
      - gemma4:31b
      - glm-5.2:cloud
      - glm-5.1
      - qwen3.5:397b
      - qwen3-coder:480b
      - qwen3-coder-next
      - qwen3-next:80b
      - qwen3-vl:235b
      - deepseek-v4-pro
      - deepseek-v4-flash
      - nemotron-3-super
      - nemotron-3-nano:30b
      - cogito-2.1:671b
  ollama-local:
    baseUrl: http://127.0.0.1:11434
  anthropic:
    defaultModels:
      - claude-sonnet-4-7
      - claude-opus-4-8
      - claude-haiku-4-5
  openai:
    defaultModels:
      - gpt-5.5
      - gpt-5.5-pro
      - gpt-5.4
      - gpt-5.4-pro
      - gpt-5.4-mini
      - gpt-5.4-nano
  openai-codex:
    defaultModels:
      - gpt-5.5
      - gpt-5.3-codex
      - gpt-5.3-codex-spark
      - gpt-5.4
      - gpt-5.4-mini
  minimax:
    baseUrl: https://api.minimax.io/anthropic
    defaultModels:
      - MiniMax-M3
  xai:
    baseUrl: https://api.x.ai/v1
    defaultModels:
      - grok-4.3
      - grok-4.20-0309-reasoning
      - grok-4.20-0309-non-reasoning
      - grok-4.20-multi-agent-0309
embeddings:
  providers:
    - provider: ollama-local
      model: nomic-embed-text
      dimensions: 768
      endpoint: http://127.0.0.1:11434/api/embeddings
    - provider: openai
      model: text-embedding-3-small
      dimensions: 1536
    - provider: ollama-cloud
      model: nomic-embed-text
      dimensions: 768
chat:
  defaultProvider: openai-codex
  defaultModel: gpt-5.5
  maxTokens: 4096
  temperature: 0.7
  historyBudget: 400000
  sessionGapMs: 1800000
situationalAwareness:
  bootstrap:
    reads:
      - NOW.md
      - PLAYBOOK.md
osEngine:
  channels:
    machine:
      enabled: true
    os:
      enabled: true
    domain:
      enabled: true
      readers:
        pressure:
          path: ~/.pressure_log.jsonl
          tail: true
          enabled: true
        health:
          path: ~/.health_log.jsonl
          tail: true
          enabled: true
        sauna:
          path: ~/.sauna_usage_log.jsonl
          tail: true
          enabled: true
        weather:
          enabled: false
        goodLife:
          enabled: true
          poll: 5m
    build:
      enabled: true
    work:
      enabled: true
    neighbor:
      enabled: true
      poll: 3m
      peers: auto
  verification:
    flagRequired: true
    zeroContextAsLegal: true
  crystallization:
    backpressure:
      cyclesWithoutReceiptThreshold: 10
    confidenceCaps:
      sensor_primary: 0.95
      sensor_derived: 0.8
      build_event: 0.9
      work_event: 0.9
      neighbor_gossip: 0.7
      zero_context_audit: 0.2
      good_life: 0.88
  decay:
    worker:
      cadence: 30m
    halfLife:
      warning_node: 48h
      surreal_transform: 24h
      unfinished_goal_review: 72h
      unreferenced_edge: 30d
  roleIntegrity:
    enforce: false
    rejectLogPath: brain/role-integrity-violations.jsonl
  closer:
    terminationContractRequired: false
    dedupeBeforeSpawn: false
  publish:
    targets:
      workspace_insights:
        cadence: 50cycles
        path: workspace/insights/
      signals:
        cadence: on_verdict_keep
      bridge_chat:
        salience_threshold: 0.75
      dashboard:
        cadence: 5m
      dream_log:
        cadence: on_critic_keep
        path: workspace/dreams/
    starvationFloor:
      workspace_insights: 6h
      dashboard: 15m
agency:
  enabled: true
  mode: live
  charterPath: agency/charter.yaml
  residentTickMs: 60000
media:
  imageGeneration:
    provider: openai
    model: gpt-image-2
