<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmo Agent Work Explorer</title>
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #131929;
            --bg-elevated: #1a2137;
            --text-primary: #e5e9f2;
            --text-secondary: #b4c0d9;
            --text-dim: #6b7a99;
            --accent-cyan: #00ffff;
            --accent-purple: #9d4edd;
            --accent-pink: #ff006e;
            --accent-green: #06ffa5;
            --accent-yellow: #ffbe0b;
            --border-subtle: rgba(255, 255, 255, 0.1);
            --success: #06ffa5;
            --warning: #ffbe0b;
            --error: #ff006e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-elevated));
            border-bottom: 1px solid var(--border-subtle);
            padding: 20px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--accent-cyan);
        }

        /* Main Layout */
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Stats Overview */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Search and Filters */
        .controls {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .filter-btn {
            padding: 10px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--accent-cyan);
        }

        .filter-btn.active {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            border-color: var(--accent-cyan);
        }

        /* Timeline View */
        .timeline-container {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .timeline-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .timeline {
            position: relative;
            padding-left: 40px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-subtle);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 24px;
            padding-left: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .timeline-item:hover {
            transform: translateX(4px);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -27px;
            top: 8px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-cyan);
            border: 3px solid var(--bg-card);
            z-index: 2;
        }

        .timeline-item.completed::before {
            background: var(--success);
        }

        .timeline-item.active::before {
            background: var(--warning);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timeline-content {
            background: var(--bg-elevated);
            border-radius: 8px;
            padding: 16px;
            border-left: 4px solid var(--accent-cyan);
        }

        .timeline-item.completed .timeline-content {
            border-left-color: var(--success);
        }

        .timeline-item.active .timeline-content {
            border-left-color: var(--warning);
        }

        .timeline-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .timeline-agent-type {
            font-weight: 600;
            color: var(--accent-cyan);
            font-size: 1rem;
        }

        .timeline-time {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .timeline-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .timeline-meta {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .timeline-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-active {
            background: rgba(255, 190, 11, 0.2);
            color: var(--warning);
        }

        .badge-completed {
            background: rgba(6, 255, 165, 0.2);
            color: var(--success);
        }

        /* Agent Cards Grid */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .agent-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-cyan);
            box-shadow: 0 8px 24px rgba(0, 255, 255, 0.1);
        }

        .agent-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .agent-type {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-cyan);
        }

        .agent-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .agent-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .agent-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Detail Panel */
        .detail-panel {
            position: fixed;
            right: -500px;
            top: 0;
            width: 500px;
            height: 100vh;
            background: var(--bg-card);
            border-left: 1px solid var(--border-subtle);
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.3);
            z-index: 200;
            transition: right 0.3s ease;
            overflow-y: auto;
        }

        .detail-panel.open {
            right: 0;
        }

        .detail-panel-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .detail-panel-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 8px;
        }

        .detail-panel-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-cyan);
        }

        .detail-panel-body {
            padding: 24px;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .detail-item {
            background: var(--bg-elevated);
            padding: 12px;
            border-radius: 8px;
        }

        .detail-item-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-cyan);
            margin-bottom: 4px;
        }

        .detail-item-label {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Related Items */
        .related-items {
            margin-top: 16px;
        }

        .related-item {
            background: var(--bg-elevated);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid var(--accent-purple);
        }

        .related-item:hover {
            background: rgba(157, 78, 221, 0.1);
            transform: translateX(4px);
        }

        .related-item-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .related-item-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-desc {
            font-size: 0.9rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        .spinner {
            border: 3px solid var(--border-subtle);
            border-top: 3px solid var(--accent-cyan);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            gap: 8px;
            background: var(--bg-elevated);
            padding: 4px;
            border-radius: 8px;
        }

        .view-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--accent-cyan);
            color: var(--bg-dark);
        }

        .view-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-title">
                <h1>🔗 Agent Work Explorer</h1>
                <div class="header-subtitle">Track what agents are doing and explore their work history</div>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="refreshData()">🔄 Refresh</button>
                <button class="btn" onclick="window.location.href='index.html'">← Dashboard</button>
                <button class="btn" onclick="window.location.href='provenance-explorer.html'">🔍 Work Trails</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Stats Overview -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">-</div>
                <div class="stat-label">Total Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-active">-</div>
                <div class="stat-label">Active Now</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-completed">-</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-goals">-</div>
                <div class="stat-label">Goals Pursued</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="controls-row">
                <input type="text" id="search-input" class="search-box" placeholder="🔍 Search agents, goals, or descriptions...">
                
                <div class="view-toggle">
                    <button class="view-btn active" onclick="setView('timeline')" id="view-timeline">📅 Timeline</button>
                    <button class="view-btn" onclick="setView('grid')" id="view-grid">🔲 Grid</button>
                </div>

                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
                <button class="filter-btn" data-filter="active" onclick="setFilter('active')">⚡ Active</button>
                <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">✅ Completed</button>
            </div>
        </div>

        <!-- Timeline View -->
        <div class="timeline-container" id="timeline-view">
            <div class="timeline-header">
                <div class="timeline-title">Agent Activity Timeline</div>
                <div class="timeline-time">Most recent first</div>
            </div>
            <div class="timeline" id="timeline-content">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading agent data...
                </div>
            </div>
        </div>

        <!-- Grid View (hidden by default) -->
        <div class="agents-grid" id="grid-view" style="display: none;">
            <!-- Agent cards will be inserted here -->
        </div>
    </div>

    <!-- Detail Panel (slides in from right) -->
    <div class="detail-panel" id="detail-panel">
        <div class="detail-panel-header">
            <button class="close-btn" onclick="closeDetail()">×</button>
            <div class="detail-panel-title" id="detail-title">Agent Details</div>
            <div class="detail-panel-subtitle" id="detail-subtitle"></div>
        </div>
        <div class="detail-panel-body" id="detail-body">
            <!-- Details will be inserted here -->
        </div>
    </div>

    <script>
        // State
        let state = {
            data: null,
            currentView: 'timeline',
            currentFilter: 'all',
            searchQuery: '',
            selectedAgent: null
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            // Setup search
            document.getElementById('search-input').addEventListener('input', (e) => {
                state.searchQuery = e.target.value.toLowerCase();
                render();
            });

            // Auto-refresh every 10 seconds
            setInterval(refreshData, 10000);
        });

        // Load data from API
        async function loadData() {
            try {
                const response = await fetch('/api/agent-network');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                state.data = await response.json();
                render();
            } catch (error) {
                console.error('Failed to load agent data:', error);
                document.getElementById('timeline-content').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-title">Failed to load agent data</div>
                        <div class="empty-state-desc">${error.message}</div>
                        <button class="btn" style="margin-top: 16px;" onclick="loadData()">🔄 Retry</button>
                    </div>
                `;
            }
        }

        function refreshData() {
            loadData();
        }

        // Render everything
        function render() {
            if (!state.data || !state.data.agents) return;

            renderStats();
            
            if (state.currentView === 'timeline') {
                renderTimeline();
            } else {
                renderGrid();
            }
        }

        // Render stats
        function renderStats() {
            const agents = state.data.agents;
            const active = agents.filter(a => a.status === 'active').length;
            const completed = agents.filter(a => a.status === 'completed').length;
            const uniqueGoals = new Set(agents.map(a => a.goalId)).size;

            document.getElementById('stat-total').textContent = agents.length;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-completed').textContent = completed;
            document.getElementById('stat-goals').textContent = uniqueGoals;
        }

        // Render timeline view
        function renderTimeline() {
            const filtered = getFilteredAgents();
            const container = document.getElementById('timeline-content');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-title">No agents found</div>
                        <div class="empty-state-desc">Try adjusting your search or filters</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(agent => `
                <div class="timeline-item ${agent.status}" onclick='showAgentDetail(${JSON.stringify(agent).replace(/'/g, "\\'")})'>
                    <div class="timeline-content">
                        <div class="timeline-header-row">
                            <div class="timeline-agent-type">🤖 ${agent.type}</div>
                            <span class="timeline-badge badge-${agent.status}">${agent.status}</span>
                        </div>
                        <div class="timeline-description">${escapeHtml(agent.description)}</div>
                        <div class="timeline-meta">
                            <span>⏱️ ${formatTime(agent.spawnTimestamp)}</span>
                            ${agent.executionTime ? `<span>⚡ ${formatDuration(agent.executionTime)}</span>` : ''}
                            ${agent.results && agent.results.length > 0 ? `<span>📊 ${agent.results.length} results</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render grid view
        function renderGrid() {
            const filtered = getFilteredAgents();
            const container = document.getElementById('grid-view');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-title">No agents found</div>
                        <div class="empty-state-desc">Try adjusting your search or filters</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(agent => `
                <div class="agent-card" onclick='showAgentDetail(${JSON.stringify(agent).replace(/'/g, "\\'")})'}>
                    <div class="agent-card-header">
                        <div class="agent-type">🤖 ${agent.type}</div>
                        <span class="timeline-badge badge-${agent.status}">${agent.status}</span>
                    </div>
                    <div class="agent-description">${escapeHtml(agent.description)}</div>
                    <div class="agent-footer">
                        <span>⏱️ ${formatTime(agent.spawnTimestamp)}</span>
                        ${agent.results && agent.results.length > 0 ? `<span>📊 ${agent.results.length} results</span>` : '<span>🔄 Running...</span>'}
                    </div>
                </div>
            `).join('');
        }

        // Get filtered agents
        function getFilteredAgents() {
            let agents = [...state.data.agents];

            // Sort by timestamp (newest first)
            agents.sort((a, b) => new Date(b.spawnTimestamp) - new Date(a.spawnTimestamp));

            // Apply filter
            if (state.currentFilter !== 'all') {
                agents = agents.filter(a => a.status === state.currentFilter);
            }

            // Apply search
            if (state.searchQuery) {
                agents = agents.filter(a => 
                    a.type.toLowerCase().includes(state.searchQuery) ||
                    a.description.toLowerCase().includes(state.searchQuery) ||
                    a.goalId.toLowerCase().includes(state.searchQuery) ||
                    a.id.toLowerCase().includes(state.searchQuery)
                );
            }

            return agents;
        }

        // Show agent detail panel
        function showAgentDetail(agent) {
            state.selectedAgent = agent;
            
            document.getElementById('detail-title').textContent = `${agent.type}`;
            document.getElementById('detail-subtitle').textContent = agent.id;

            // Find related agents (same goal)
            const relatedAgents = state.data.agents.filter(a => 
                a.goalId === agent.goalId && a.id !== agent.id
            ).slice(0, 5);

            // Find the goal
            const goal = state.data.goals.find(g => g.id === agent.goalId);

            document.getElementById('detail-body').innerHTML = `
                <div class="detail-section">
                    <div class="detail-label">Description</div>
                    <div class="detail-value">${escapeHtml(agent.description)}</div>
                </div>

                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="detail-item-value">${agent.status}</div>
                        <div class="detail-item-label">Status</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item-value">${formatDuration(agent.executionTime)}</div>
                        <div class="detail-item-label">Execution Time</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item-value">${agent.results ? agent.results.length : 0}</div>
                        <div class="detail-item-label">Results Produced</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item-value">${formatTime(agent.spawnTimestamp)}</div>
                        <div class="detail-item-label">Started</div>
                    </div>
                </div>

                ${goal ? `
                    <div class="detail-section">
                        <div class="detail-label">Working on Goal</div>
                        <div class="detail-value">
                            <div class="related-item" onclick="showGoalInDashboard('${goal.id}')">
                                <div class="related-item-title">🎯 ${goal.id}</div>
                                <div class="related-item-desc">${escapeHtml(goal.description)}</div>
                            </div>
                        </div>
                    </div>
                ` : ''}

                ${agent.results && agent.results.length > 0 ? `
                    <div class="detail-section">
                        <div class="detail-label">Results Generated</div>
                        <div class="detail-value">
                            ${agent.results.map(r => `<div style="background: var(--bg-elevated); padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-family: monospace; font-size: 0.85rem;">📊 ${r}</div>`).join('')}
                        </div>
                    </div>
                ` : ''}

                ${relatedAgents.length > 0 ? `
                    <div class="detail-section">
                        <div class="detail-label">Related Agents (Same Goal)</div>
                        <div class="related-items">
                            ${relatedAgents.map(ra => `
                                <div class="related-item" onclick='showAgentDetail(${JSON.stringify(ra).replace(/'/g, "\\'")})'>
                                    <div class="related-item-title">🤖 ${ra.type}</div>
                                    <div class="related-item-desc">${ra.status} • ${formatTime(ra.spawnTimestamp)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}

                <div class="detail-section">
                    <div class="detail-label">Agent ID</div>
                    <div class="detail-value" style="font-family: monospace; font-size: 0.85rem; color: var(--text-dim);">${agent.id}</div>
                </div>
            `;

            document.getElementById('detail-panel').classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('open');
        }

        function showGoalInDashboard(goalId) {
            window.location.href = `index.html#goal-${goalId}`;
        }

        // View and filter controls
        function setView(view) {
            state.currentView = view;
            
            // Update buttons
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');

            // Show/hide views
            if (view === 'timeline') {
                document.getElementById('timeline-view').style.display = 'block';
                document.getElementById('grid-view').style.display = 'none';
                renderTimeline();
            } else {
                document.getElementById('timeline-view').style.display = 'none';
                document.getElementById('grid-view').style.display = 'grid';
                renderGrid();
            }
        }

        function setFilter(filter) {
            state.currentFilter = filter;
            
            // Update buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });

            render();
        }

        // Utilities
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days}d ago`;
            if (hours > 0) return `${hours}h ago`;
            if (minutes > 0) return `${minutes}m ago`;
            return 'just now';
        }

        function formatDuration(ms) {
            if (!ms) return 'N/A';
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);

            if (hours > 0) return `${hours}h ${minutes % 60}m`;
            if (minutes > 0) return `${minutes}m ${seconds % 60}s`;
            return `${seconds}s`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Escape to close detail panel
            if (e.key === 'Escape' && document.getElementById('detail-panel').classList.contains('open')) {
                closeDetail();
            }
            
            // / to focus search
            if (e.key === '/' && document.activeElement !== document.getElementById('search-input')) {
                e.preventDefault();
                document.getElementById('search-input').focus();
            }
        });
    </script>
</body>
</html>
