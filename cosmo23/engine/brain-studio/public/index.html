<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Brain Studio</title>
  <link rel="stylesheet" href="css/brain-studio.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1 id="brainName">Brain Studio</h1>
        <span id="brainStats" class="stats-badge">Loading...</span>
      </div>
      <nav class="header-tabs">
        <button class="tab-btn active" data-tab="query">💬 Query</button>
        <button class="tab-btn" data-tab="files">📁 Files</button>
        <button class="tab-btn" data-tab="explore">🔭 Explore</button>
      </nav>
    </header>

    <!-- Tab Panels -->
    <main class="app-main">
      <!-- Query Panel -->
      <div id="query-panel" class="tab-panel active"></div>
      
      <!-- Files Panel -->
      <div id="files-panel" class="tab-panel"></div>
      
      <!-- Explore Panel -->
      <div id="explore-panel" class="tab-panel"></div>
    </main>
  </div>

  <!-- Load modular JavaScript -->
  <script src="js/query-tab.js"></script>
  <script src="js/files-tab.js"></script>
  <script src="js/explore-tab.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
