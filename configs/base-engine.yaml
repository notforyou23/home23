coordinator:
  enabled: true
  reviewCyclePeriod: 50
  model: gpt-5-mini
  reasoningEffort: low
  maxTokens: 3000
  maxConcurrent: 2
  enableCodingAgents: false
  useTemplateReports: true
  useMemorySummaries: true
  extractiveSummarization: true
  qualityAssurance:
    enabled: false
    mode: balanced
    minConfidence: 0.7
    autoRejectThreshold: 0.3
    checkNovelty: false
    checkConsistency: true
    checkFactuality: false
  agentTypeWeights:
    research: 40
    analysis: 35
    synthesis: 35
    exploration: 20
    document_analysis: 15
    consistency: 10
    planning: 0
    integration: 0
    code_creation: 0
    code_execution: 0
    document_creation: 0
    quality_assurance: 0
    completion: 0
    specialized_binary: 0
  codeExecution:
    enabled: false
    containerTimeout: 600000
    maxContainersPerReview: 1
    autoCleanup: true
execution:
