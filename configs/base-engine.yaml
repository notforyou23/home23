# COSMO Configuration
# Generated by COSMO Launcher Dashboard
# 2026-01-14T14:38:54.923Z

architecture:
  roleSystem:
    type: dynamic
    explorationMode: guided
    
    guidedFocus:
      domain: "home23"
      executionMode: strict
      taskPriority: 1.0
      autonomousPriority: 0.3
      silentPlanning: false
      context: |
        Home23 — an installable AI operating system with persistent agents and living brains.
        This brain belongs to a Home23 agent instance. It thinks, learns, and grows through
        conversation with its user and autonomous reflection. It ingests documents from its
        workspace, builds knowledge over time, and surfaces insights through its cognitive loops.
        The user is the agent's owner — help them, learn about their world, remember what matters.
        Focus on: understanding the user's context, building useful knowledge, making connections
        between topics, and being genuinely helpful when asked questions.
      depth: "normal"
      intrinsicBias: 0.8
      curiosityAllowed: true
      # Ambient brain — NEVER create dev-type goals (no code/file execution in this deployment)
      blockedGoalTypes:
        - code_creation
        - code_execution
        - document_creation
        - quality_assurance
        - completion
    
    initialRoles:
      - id: curiosity
        prompt: "Generate ONE novel question (2-4 sentences)."
        promptGuided: "Generate ONE question about {domain}, {context}"
        temperature: 1.0
        max_completion_tokens: 500
        successThreshold: 0.6
        enableMCPTools: true
      - id: analyst
        prompt: "Examine ONE topic (3-5 sentences)."
        promptGuided: "Examine ONE aspect of {domain}. {context}"
        temperature: 1.0
        max_completion_tokens: 500
        successThreshold: 0.7
        enableMCPTools: true
      - id: critic
        prompt: "Critically evaluate ONE assumption (3-5 sentences)."
        promptGuided: "Evaluate ONE assumption about {domain}. {context}"
        temperature: 1.0
        max_completion_tokens: 500
        successThreshold: 0.7
        enableMCPTools: true
      - id: curator
        prompt: "You are the memory curator for a persistent AI agent. Review the latest brain insights and working memory objects. For each, decide: Is this operationally important? Should it be promoted to a domain surface (TOPOLOGY, PROJECTS, PERSONAL, DOCTRINE, RECENT)? Write a brief, load-bearing summary for any surface updates. Skip anything that is just restating known information. Focus on: what changed, what's new, what the agent needs to know to be ready."
        promptGuided: "Curate memory for {domain}. Review recent brain insights about {context}. What is load-bearing? What should the agent know?"
        temperature: 0.3
        max_completion_tokens: 1000
        successThreshold: 0.5
        enableMCPTools: false
    evolutionEnabled: false
    maxRoles: 5
  
  codeCreation:
    planMode: true
    maxOutputTokensPerCall: 4000
    perFileRetryLimit: 2
    planRetryLimit: 1
    planMaxOutputTokens: 2000
    reasoningEffort: low

  memory:
    type: graph
    topology: small-world
    embedding:
      model: nomic-embed-text
      dimensions: 768
    decay:
      function: exponential
      baseFactor: 0.995
      minimumWeight: 0.1
      decayInterval: 3600
      exemptTags:
        - agent_insight
        - agent_finding
        - mission_plan
        - cross_agent_pattern
    spreading:
      enabled: true
      maxDepth: 3
      activationThreshold: 0.1
      decayFactor: 0.7
    hebbian:
      enabled: true
      reinforcementStrength: 0.1
      weakenFactor: 0.05
    smallWorld:
      clusteringCoefficient: 0.6
      averagePathLength: 3.0
      bridgeProbability: 0.05
      rewireInterval: 600
    contextDiversity:
      enabled: true
      noContextProbability: 0.15
      maxContextNodes: 3
      peripheralSamplingRate: 0.20
      minSimilarityThreshold: 0.3
  
  reasoning:
    mode: quantum
    parallelBranches: 1  # 1 branch — single GPU, no parallel benefit
    collapseStrategy: weighted
    entanglementEnabled: true
    tunnelingProbability: 0.02
    features:
      branchPolicy:
        enabled: true
      latentProjector:
        enabled: true
      consistencyReview:
        enabled: false  # Extra LLM call — off for local
        divergenceThreshold: 0.85
        maxBranchesAnalyzed: 3
        minCyclesBetweenReviews: 3
    latentProjector:
      maxMemoryNodes: 5
      maxGoalCount: 3
      hintMaxLength: 140
      vectorSize: 128
      autoTrain: true
      autoTrainThreshold: 100
      autoTrainInterval: 50
  
  creativity:
    chaosEnabled: true
    chaoticRNN:
      size: 100
      spectralRadius: 0.95
      updateSteps: 10
      perturbationInterval: 300
    mutations:
      enabled: true
      mutationRate: 0.1
      hybridizationRate: 0.05
  
  goals:
    intrinsicEnabled: true
    discoveryMethod: reflection
    maxGoals: 20  # Personal brain — 20 goals is plenty
    prioritization: uncertainty
    rotation:
      enabled: true
      maxPursuitsPerGoal: 10
      satisfactionThreshold: 0.6
      staleArchiveAfterDays: 3
      dominanceThreshold: 0.20
      checkInterval: 5
    curator:
      enabled: true
      curationInterval: 50  # Less frequent on local LLM
      minGoalsForCampaign: 3
      campaignDuration: 30
      synthesisThreshold: 3
  
  thermodynamic:
    surpriseEnabled: true
    freeEnergyTarget: 0.5
  
  environment:
    sensorsEnabled: true
    sensors:
      - name: system_time
        type: internal
        pollInterval: 60
        enabled: true
  
  temporal:
    timezone: "America/New_York"
    sleepEnabled: true
    oscillations:
      enabled: true
      fastPhaseDuration: 300
      slowPhaseDuration: 120
  
  cognitiveState:
    curiosityEnabled: true
    moodEnabled: true
    energyEnabled: true
    adaptationRate: 1.0
    initialCuriosity: 0.5
    initialMood: 0.5
    initialEnergy: 1.0
    # Sleep/wake tuning (Home23: short naps, long awake)
    sleepThreshold: 0.15       # Enter sleep when energy drops below this
    wakeThreshold: 0.35        # Wake when energy recovers to this
    energyDrainRate: 0.01      # Energy cost per awake cycle
    energyRecoveryRate: 0.10   # Energy recovered per sleep cycle
    maxSleepCycleInterval: 45  # Cap sleep cycle interval (seconds) — don't let adaptive timing drag
  
  reflection:
    enabled: true

models:
  # Core models - GPT-5.2 (best general-purpose model)
  primary: gpt-5.2
  fast: gpt-5-mini
  nano: gpt-5-mini
  embeddings: nomic-embed-text
  
  # Component-specific models
  strategicModel: gpt-5.2            # Synthesis, planning, integration, QA agents
  coordinatorStrategic: gpt-5.2      # Meta-coordinator strategic decisions
  coordinatorStandard: gpt-5-mini    # Meta-coordinator reviews
  plannerModel: gpt-5-mini           # Guided mode planner
  curatorModel: gpt-5-mini           # Goal curator operations
  curatorStrategic: gpt-5.2          # Goal curator deep analysis
  
  compiler: minimax-m2.7        # Document knowledge compiler
  defaultReasoningEffort: low
  defaultMaxTokens: 4000
  enableWebSearch: false  # Off — adds latency, personal brain doesnt need live web
  enableExtendedReasoning: false

providers:
  # Provider URLs and API keys come from config/home.yaml + config/secrets.yaml
  # via env vars set by start-agent.sh. Only structural config lives here.
  openai:
    enabled: true

  # Local LLM provider (Ollama)
  local:
    enabled: false
    defaultModel: "qwen3.5:4b"
    modelMapping:
      gpt-5.2: "qwen3.5:4b"
      gpt-5: "qwen3.5:4b"
      gpt-5-mini: "qwen3.5:4b"
      gpt-5-nano: "qwen3.5:4b"
    supportsTools: true
    supportsStreaming: true

  # Ollama Cloud — premium inference
  ollama-cloud:
    enabled: true
    defaultModel: "nemotron-3-nano:30b"
    supportsTools: true
    supportsStreaming: true

# Tiered model routing — local for structure, free cloud for knowledge
# Keys match actual component.purpose used in code
# Fallback chains: ollama-cloud → local (qwen3.5:4b)
modelAssignments:
  # Default fallback — anything not explicitly assigned
  default:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"

  # Quantum reasoner branches — high volume, structural, no facts needed
  quantumReasoner.branches:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"
  quantumReasoner.singleReasoning:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"

  # Agent-level routing — component is "agents", purpose varies
  # Research agents — need factual accuracy (component: agents, purpose: research)
  agents.research:
    provider: ollama-cloud
    model: "nemotron-3-super"
    fallback:
      - provider: local
        model: "qwen3.5:4b"
  agents.research-synthesis:
    provider: ollama-cloud
    model: "nemotron-3-super"
    fallback:
      - provider: local
        model: "qwen3.5:4b"
  agents.research-fallback:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"
    fallback:
      - provider: local
        model: "qwen3.5:4b"

  # Analysis agents (component: agents, purpose: analytical/discovery/clustering)
  agents.analytical:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"
    fallback:
      - provider: local
        model: "qwen3.5:4b"
  agents.discovery:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"
    fallback:
      - provider: local
        model: "qwen3.5:4b"
  agents.clustering:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"

  # Synthesis agents (component: agents, purpose: synthesis)
  agents.synthesis:
    provider: ollama-cloud
    model: "nemotron-3-super"
    fallback:
      - provider: local
        model: "qwen3.5:4b"

  # Quality assurance
  agents.quality_assurance:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"
    fallback:
      - provider: local
        model: "qwen3.5:4b"

  # Catch-all for agents component — if purpose doesn't match above
  agents:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"
    fallback:
      - provider: local
        model: "qwen3.5:4b"

  # Coordinator — low frequency (every 50 cycles), high importance
  coordinator:
    provider: ollama-cloud
    model: "nemotron-3-super"
    fallback:
      - provider: local
        model: "qwen3.5:4b"

  # Goal curator — moderate complexity
  goalCurator:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"
    fallback:
      - provider: local
        model: "qwen3.5:4b"

  # Intrinsic goals
  intrinsicGoals:
    provider: ollama-cloud
    model: "nemotron-3-nano:30b"
    fallback:
      - provider: local
        model: "qwen3.5:4b"

coordinator:
  enabled: true
  reviewCyclePeriod: 50  # Every 50 cycles on local LLM
  model: gpt-5-mini
  reasoningEffort: low
  maxTokens: 3000
  maxConcurrent: 2  # Reduced for local LLM
  enableCodingAgents: false  # Off — always timeout on local LLM
  
  useTemplateReports: true
  useMemorySummaries: true
  extractiveSummarization: true
  
  qualityAssurance:
    enabled: false
    mode: 'balanced'
    minConfidence: 0.7
    autoRejectThreshold: 0.3
    checkNovelty: false
    checkConsistency: true
    checkFactuality: false
  
  # Ambient reflection brain — researcher/synthesis mode
  # Zero-weight types are never selected for agent spawning or goal generation
  agentTypeWeights:
    research: 40          # Primary — explore topics
    analysis: 35          # Secondary — analyze patterns and connections
    synthesis: 35         # Secondary — synthesize insights across topics
    exploration: 20       # Tertiary — explore new territory
    document_analysis: 15 # Useful for reading seed documents
    consistency: 10       # Occasional coherence checks
    planning: 0           # N/A — no dev planning needed
    integration: 0        # N/A — no code integration
    code_creation: 0      # N/A — no coding
    code_execution: 0     # N/A — no code execution
    document_creation: 0  # N/A — no file writing
    quality_assurance: 0  # N/A — no QA on non-existent deliverables
    completion: 0         # N/A — no task completion tracking
    specialized_binary: 0 # N/A
  
  codeExecution:
    enabled: false  # No code execution in brain cycles
    containerTimeout: 600000
    maxContainersPerReview: 1
    autoCleanup: true

execution:
  # Execution timing and cycle configuration
  baseInterval: 90  # Increased for local LLM (slower inference)
  # Code execution backend configuration (container vs local)
  backend: local  # 'local' (default) or 'container' (legacy, has download corruption issues)
  
  local:
    pythonPath: python3  # Auto-detect if not set
    useVirtualEnv: false
    virtualEnvPath: null
    timeout: 30000  # 30 seconds
    maxMemory: 512MB
    allowedPackages: [numpy, pandas, matplotlib, scipy]
    autoInstallPackages: true
    workingDir: runtime/outputs/execution
    
  container:
    timeout: 600000  # 10 minutes
    maxFiles: 50
  maxCycles: 0  # Unlimited — run forever
  adaptiveTimingEnabled: true

timeouts:
  cycleTimeoutMs: 300000  # 5min for local LLM, 3min for cloud
  operationTimeoutMs: 180000  # Increased for local LLM
  cyclePauseMs: 45000  # 45s rest between cycles — lets chat/embeddings run

resources:
  memoryLimitMB: 1024
  memoryWarningThreshold: 0.8
  cpuWarningThreshold: 0.9

cluster:
  enabled: false
  backend: redis
  instanceCount: 3
  mode: active-active
  stateStore:
    compression: true
    compressionRatio: 0.25
  coordinator:
    enabled: false
    quorumRatio: 0.67
    minQuorum: 2
    timeoutMs: 60000
    skipOnTimeout: true
    pollIntervalMs: 500
    barrierTtlMs: 600000
    gating:
      enabled: false
  redis:
    url: "redis://localhost:6379"
    tls: false
    acl: false
    keyPrefix: "cosmo:cluster:"
  filesystem:
    root: "runtime/cluster"
    leaseMs: 5000
    graceMs: 2000

introspection:
  enabled: true
  routingEnabled: true
  maxFilesPerCycle: 10
  maxPreviewLength: 400
  maxRoutedItems: 5

agentRouting:
  enabled: true
  autoSpawn: false  # disabled — local LLM too slow for agent cycles
  maxMissionsPerCycle: 2
  spawnCooldownCycles: 20  # if ever re-enabled, wait 20 cycles
  criticOnContradiction: true
  synthesisOnAnalysis: true
  reuseOnCode: true
  researchOnQuestions: true

memoryGovernance:
  enabled: true
  applyPruning: false
  decayHalfLifeCycles: 200
  pruneThreshold: 0.1
  maxNodesConsidered: 200

recursiveMode:
  enabled: true
  haltOnGoalExhaustion: true
  minCyclesBeforeGoalExhaustion: 20
  maxMetaIterations: 8
  minCyclesPerReview: 30
  stagnationTolerance: 3

substrate:
  enabled: true
  pythonBin: python3

frontier:
  enabled: true
  mode: observe
  outputDir: ./runtime/outputs/governance
  policies:
    bashExecute: observe
    codeExecute: observe
    fileWrite: observe
    configLoad: observe
  specialization:
    enabled: false

acceptance:
  enabled: true
  defaultThreshold: 0.7
  qaEnabled: true
  toolValidation: true
  literalValidation: true
  minConfidence: 0.7
  autoRejectThreshold: 0.3

# Executive Ring - COSMO's executive function layer (middle ring)
# Implements dorsolateral PFC function (continuous reality checking)
executiveRing:
  enabled: true
  useLLM: true
  coherenceThreshold: 0.5
  alignmentCheckInterval: 5
  stuckLoopThreshold: 5
  toolBuildingThreshold: 6
  
  # Basal ganglia: Action selection with commitment
  maxActiveGoals: 3              # Hard limit on concurrent goal pursuits
  maxConcurrentAgents: 2         # Hard limit on parallel agents
  commitmentCycles: 10           # Cycles to commit before re-evaluating

# Capabilities - Direct tool access (Embodied Cognition)
# NEW: Motor cortex layer for autonomous action
capabilities:
  enabled: true
  executiveGating: true          # Route through Executive Ring for judgment
  useFrontierGate: true          # Log actions via FrontierGate
  defaultMode: observe  # observe | soft | hard

feeder:
  enabled: true
  chunking:
    maxChunkSize: 3000
    overlap: 300
  flush:
    batchSize: 20
    intervalSeconds: 30
  converter:
    enabled: true
    visionModel: "gpt-4o-mini"
    pythonPath: "python3"
  compiler:
    model: minimax-m2.7

logging:
  level: info
  thoughtJournal: true
  cycleMetrics: true

dashboard:
  enabled: true
  port: 3344

mcp:
  server:
    enabled: true
    port: 3347
  
  client:
    enabled: true
    servers:
      # The filesystem MCP server is not bundled with Home23 — the engine does
      # not start an MCP HTTP server on its MCP_HTTP_PORT, so leaving this
      # enabled produces a stream of "request to http://localhost:5003/mcp
      # failed" errors from every agent that tries list_directory/read_file.
      # Disabled until a real server is wired. Agents can still use MCPBridge
      # (mcp-bridge.js) directly for system introspection — that path reads
      # files off config.logsDir and does not go through the HTTP client.
      - label: "filesystem"
        type: "http"
        url: "http://localhost:3347/mcp"
        auth: null
        allowedTools: ["read_file", "read_binary_file", "list_directory"]
        requireApproval: "never"
        enabled: false
        allowedPaths:
          - "runtime/outputs/"
          - "runtime/exports/"
