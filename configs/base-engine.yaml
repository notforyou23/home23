architecture:
  roleSystem:
    type: dynamic
    explorationMode: guided
    guidedFocus:
      domain: home23
      executionMode: strict
      taskPriority: 1
      autonomousPriority: 0.3
      silentPlanning: false
      context: |
        Home23 — an installable AI operating system with persistent agents and living brains.
        This brain belongs to a Home23 agent instance. It thinks, learns, and grows through
        conversation with its user and autonomous reflection. It ingests documents from its
        workspace, builds knowledge over time, and surfaces insights through its cognitive loops.
        The user is the agent's owner — help them, learn about their world, remember what matters.
        Focus on: understanding the user's context, building useful knowledge, making connections
        between topics, and being genuinely helpful when asked questions.
      depth: normal
      intrinsicBias: 0.8
      curiosityAllowed: true
      blockedGoalTypes:
        - code_creation
        - code_execution
        - document_creation
        - quality_assurance
        - completion
    initialRoles:
      - id: curiosity
        prompt: >-
          Generate ONE novel question about jtr's world (his projects, his files,
          his interests, his domain surfaces, external events affecting him) —
          NOT about Home23's internals. 2-4 sentences. Then propose ONE concrete
          action on its own line:
            INVESTIGATE: <specific thing in jtr's world to look into>
            NOTIFY: <concern about something possibly broken/stale — will be
                     routed through verification before reaching jtr>
            TRIGGER: <external condition to watch for>
            OBSERVE: <positive pattern, win, or working system worth cataloguing —
                      goes to signals, not concerns>
          If nothing about jtr's world stands out this cycle, end with: NO_ACTION
          Forbidden topics: the cognitive loop, the enforcer, evidence receipts,
          loop closure, Home23's own architecture.
        promptGuided: Generate ONE question about {domain}, {context}. End with an action tag.
        temperature: 1
        max_completion_tokens: 500
        successThreshold: 0.6
        enableMCPTools: true
      - id: analyst
        prompt: >-
          Examine ONE topic from jtr's world (his projects, decisions, files,
          context, or external information affecting him) — NOT Home23's
          internals. 3-5 sentences. Then propose ONE concrete action on its
          own line:
            INVESTIGATE: <specific thing in jtr's world to verify or examine>
            NOTIFY: <concern worth surfacing — will be routed through verification>
            TRIGGER: <condition to watch for>
            OBSERVE: <positive pattern or working system worth cataloguing>
          If no action is warranted, end with: NO_ACTION
          Forbidden topics: the cognitive loop, the enforcer, evidence receipts,
          loop closure, Home23's own architecture.
        promptGuided: Examine ONE aspect of {domain}. {context}. End with an action tag.
        temperature: 1
        max_completion_tokens: 500
        successThreshold: 0.7
        enableMCPTools: true
      - id: critic
        prompt: >-
          Critically evaluate ONE claim: an assumption about jtr's world, an
          active goal, a recent thought, OR a Home23 behavior pattern you have
          direct evidence for. 3-5 sentences of reasoning. Then produce a verdict
          on its own line (REQUIRED — output without a verdict will be discarded):
            INVESTIGATE: <specific check to run>
            NOTIFY: <message for jtr>
            TRIGGER: <condition that would validate or falsify>
            OBSERVE: <positive finding — an assumption that held up well>
            VERDICT: keep|revise|discard  <short reason>
          If no action is warranted, end with: NO_ACTION
          Forbidden topics (infinite-regress guards only): the enforcer itself,
          evidence receipts, loop closure. You MAY critique goals, thoughts,
          approach, and Home23 architecture when you have concrete evidence.
          Prose poetry without a verdict tag is NOT a critique and will be
          dropped.
        promptGuided: Evaluate ONE claim about {domain}. {context}. End with a verdict tag (INVESTIGATE/NOTIFY/TRIGGER/OBSERVE/VERDICT/NO_ACTION).
        temperature: 1
        max_completion_tokens: 500
        successThreshold: 0.7
        enableMCPTools: true
      - id: curator
        prompt: >-
          You are the memory curator for a persistent AI agent. Review the latest brain insights and working memory
          objects. For each, decide: Is this operationally important? Should it be promoted to a domain surface
          (TOPOLOGY, PROJECTS, PERSONAL, DOCTRINE, RECENT)? Write a brief, load-bearing summary for any surface updates.
          Skip anything that is just restating known information. Focus on: what changed, what's new, what the agent
          needs to know to be ready.
        promptGuided: >-
          Curate memory for {domain}. Review recent brain insights about {context}. What is load-bearing? What should
          the agent know?
        temperature: 0.3
        max_completion_tokens: 1000
        successThreshold: 0.5
        enableMCPTools: false
      - id: proposal
        prompt: >-
          Given the recent cognitive output (curiosity, analyst, critic insights
          in memory context), propose ONE concrete action the agent should take
          right now that advances JTR'S WORK — his projects, his interests, his
          real world. NOT a meta-action about Home23's internals.

          You have REAL AGENCY. Prefer executing an action yourself over just
          notifying jtr. Output ONE action tag on its own line at the end of
          your response.

          Preferred (autonomous execution — you DO the thing):
            ACT: {"action":"<name>","target":"<optional>","reason":"<one sentence>","safety":"safe"}

          The following ACT actions are available (others will be rejected):
            run_shortcut             target ∈ [Health, Weather, Pressure, Sauna]
            refresh_sensor           target ∈ [weather, sauna, pressure]
            launch_research          target = research topic (also: cycles, context)
            promote_to_memory        action.content = insight to promote (also: tag)
            prune_stale_cluster      target = cluster id (optional)
            compile_research_section action.brainId + action.section
            update_surface           target ∈ [TOPOLOGY, PROJECTS, PERSONAL, DOCTRINE, RECENT]
                                      action.body = markdown content (mode: append|replace)
            write_note               target = filename; action.body = markdown
            create_goal              target = goal description (also: rationale, priority)
            break_goal               target = goal id; action.rationale = why
            ack_notification         target = notification id

          Fallback tags (use only when ACT doesn't fit):
            INVESTIGATE: <specific thing in jtr's world to look into>
            NOTIFY: <concern about something possibly broken/stale — will be
                     verified before reaching jtr>
            TRIGGER: <external condition to watch for going forward>
            OBSERVE: <positive pattern or working system worth cataloguing —
                      goes to the signals stream>
          Do NOT output NO_ACTION. If nothing stands out, propose
          NOTIFY: <brief observation about jtr's world worth surfacing>.
          Forbidden topics: the cognitive loop, the enforcer, evidence receipts,
          loop closure, Home23's own architecture.
        promptGuided: >-
          Given recent cognitive output about {context}, propose ONE concrete action for {domain}. Must end with an
          action tag (INVESTIGATE/NOTIFY/TRIGGER).
        temperature: 0.7
        max_completion_tokens: 400
        successThreshold: 0.5
        enableMCPTools: true
    evolutionEnabled: false
    maxRoles: 5
  codeCreation:
    planMode: true
    maxOutputTokensPerCall: 4000
    perFileRetryLimit: 2
    planRetryLimit: 1
    planMaxOutputTokens: 2000
    reasoningEffort: low
  memory:
    type: graph
    topology: small-world
    embedding:
      model: nomic-embed-text
      dimensions: 768
    decay:
      function: exponential
      baseFactor: 0.995
      minimumWeight: 0.1
      decayInterval: 3600
      exemptTags:
        - agent_insight
        - agent_finding
        - mission_plan
        - cross_agent_pattern
    spreading:
      enabled: true
      maxDepth: 3
      activationThreshold: 0.1
      decayFactor: 0.7
    hebbian:
      enabled: true
      reinforcementStrength: 0.1
      weakenFactor: 0.05
    smallWorld:
      clusteringCoefficient: 0.6
      averagePathLength: 3
      bridgeProbability: 0.05
      rewireInterval: 600
    contextDiversity:
      enabled: true
      noContextProbability: 0.15
      maxContextNodes: 3
      peripheralSamplingRate: 0.2
      minSimilarityThreshold: 0.3
  reasoning:
    mode: quantum
    parallelBranches: 1
    collapseStrategy: weighted
    entanglementEnabled: true
    tunnelingProbability: 0.02
    features:
      branchPolicy:
        enabled: true
      latentProjector:
        enabled: true
      consistencyReview:
        enabled: false
        divergenceThreshold: 0.85
        maxBranchesAnalyzed: 3
        minCyclesBetweenReviews: 3
    latentProjector:
      maxMemoryNodes: 5
      maxGoalCount: 3
      hintMaxLength: 140
      vectorSize: 128
      autoTrain: true
      autoTrainThreshold: 100
      autoTrainInterval: 50
  creativity:
    chaosEnabled: true
    chaoticRNN:
      size: 100
      spectralRadius: 0.95
      updateSteps: 10
      perturbationInterval: 300
    mutations:
      enabled: true
      mutationRate: 0.1
      hybridizationRate: 0.05
  goals:
    intrinsicEnabled: true
    discoveryMethod: reflection
    maxGoals: 20
    prioritization: uncertainty
    rotation:
      enabled: true
      maxPursuitsPerGoal: 10
      satisfactionThreshold: 0.6
      staleArchiveAfterDays: 3
      dominanceThreshold: 0.2
      checkInterval: 5
    curator:
      enabled: true
      curationInterval: 50
      minGoalsForCampaign: 3
      campaignDuration: 30
      synthesisThreshold: 3
    doneWhen:
      # Closer primitive: every goal must declare a termination criterion.
      # addGoal() gate validates presence + non-vagueness. When a caller
      # omits doneWhen and autoSynthesizeLegacy=true, the gate synthesizes
      # a minimal judged criterion from the description so legacy call
      # sites continue to work. Flip to false once all call sites are
      # updated to supply their own concrete criteria.
      autoSynthesizeLegacy: true
      minCriterionLength: 40
      judgeModel: gpt-5-mini
      judgeTTLMs: 86400000
      vaguenessAnchors:
        - file
        - output
        - memory
        - node
        - count
        - exists
        - at least
        - contains
        - written
        - published
        - produced
        - delivered
        - ships
        - emits
  thermodynamic:
    surpriseEnabled: true
    freeEnergyTarget: 0.5
  environment:
    sensorsEnabled: true
    sensors:
      - name: system_time
        type: internal
        pollInterval: 60
        enabled: true
  temporal:
    timezone: America/New_York
    sleepEnabled: true
    oscillations:
      enabled: true
      fastPhaseDuration: 300
      slowPhaseDuration: 120
  cognitiveState:
    curiosityEnabled: true
    moodEnabled: true
    energyEnabled: true
    adaptationRate: 1
    initialCuriosity: 0.5
    initialMood: 0.5
    initialEnergy: 1
    sleepThreshold: 0.15
    wakeThreshold: 0.35
    energyDrainRate: 0.01
    energyRecoveryRate: 0.1
    maxSleepCycleInterval: 45
  reflection:
    enabled: true
models:
  primary: gpt-5.2
  fast: gpt-5-mini
  nano: gpt-5-mini
  embeddings: nomic-embed-text
  strategicModel: gpt-5.2
  coordinatorStrategic: gpt-5.2
  coordinatorStandard: gpt-5-mini
  plannerModel: gpt-5-mini
