<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 COSMO Research Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2em;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }

        .section {
            background: #1a1f3a;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2a2f4a;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #667eea;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-bar input {
            flex: 1;
            padding: 10px 15px;
            background: #0d1127;
            border: 2px solid #2a2f4a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.9em;
        }

        .filter-bar select {
            padding: 10px 15px;
            background: #0d1127;
            border: 2px solid #2a2f4a;
            border-radius: 6px;
            color: #e0e0e0;
            cursor: pointer;
        }

        .run-card {
            background: #0d1127;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .run-card:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .run-card.active {
            border-left-color: #10b981;
        }

        .run-card.paused {
            border-left-color: #f59e0b;
        }

        .run-card.complete {
            border-left-color: #64748b;
        }

        .run-card.error {
            border-left-color: #ef4444;
        }

        .run-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .run-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .run-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #e0e0e0;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.active {
            background: #10b98120;
            color: #10b981;
        }

        .status-badge.paused {
            background: #f59e0b20;
            color: #f59e0b;
        }

        .status-badge.complete {
            background: #64748b20;
            color: #64748b;
        }

        .run-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .meta-item {
            font-size: 0.85em;
        }

        .meta-label {
            color: #888;
            margin-bottom: 3px;
        }

        .meta-value {
            color: #e0e0e0;
            font-weight: 600;
        }

        .run-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .run-actions .btn {
            padding: 6px 12px;
            font-size: 0.85em;
            background: #2a2f4a;
        }

        .run-actions .btn:hover {
            background: #3a3f5a;
        }

        .run-actions .btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .run-actions .btn.primary:hover {
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            border: 3px solid #2a2f4a;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🧠 COSMO Research Lab</h1>
                <div class="subtitle">Manage all autonomous research experiments</div>
            </div>
            <div class="header-actions">
                <a href="/" class="btn">Dashboard</a>
                <a href="/query" class="btn">Query Interface</a>
            </div>
        </header>

        <!-- Lab Statistics -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Runs</div>
                <div class="stat-value" id="stat-total">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Now</div>
                <div class="stat-value" id="stat-active">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Cycles</div>
                <div class="stat-value" id="stat-cycles">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Memory Nodes</div>
                <div class="stat-value" id="stat-nodes">-</div>
            </div>
        </div>

        <!-- Active Runs Section -->
        <div class="section" id="active-section">
            <div class="section-header">
                <div class="section-title">🟢 Active Runs</div>
            </div>
            <div id="active-runs-list"></div>
        </div>

        <!-- All Runs Section -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">📚 All Runs</div>
            </div>
            
            <div class="filter-bar">
                <input type="text" id="search-input" placeholder="🔍 Search runs by name or domain...">
                <select id="status-filter">
                    <option value="all">All Status</option>
                    <option value="active">Active</option>
                    <option value="paused">Paused</option>
                    <option value="complete">Complete</option>
                </select>
                <select id="sort-select">
                    <option value="recent">Most Recent</option>
                    <option value="name">Name A-Z</option>
                    <option value="cycles">Most Cycles</option>
                </select>
            </div>

            <div id="all-runs-list"></div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="loading">
            <div class="spinner"></div>
            <p>Loading research lab...</p>
        </div>
    </div>

    <script>
        let allRuns = [];
        let currentRun = null;

        async function loadRuns() {
            try {
                document.getElementById('loading-state').style.display = 'block';
                
                // Load runs list
                const runsResponse = await fetch('/api/runs');
                const runsData = await runsResponse.json();
                
                allRuns = runsData.runs || [];
                currentRun = runsData.current?.name || 'runtime';

                // Load stats for each run in parallel
                const statsPromises = allRuns.map(async run => {
                    try {
                        const response = await fetch(`/api/runs/${run.name}/stats`);
                        const stats = await response.json();
                        run.stats = stats;
                    } catch (error) {
                        console.warn(`Failed to load stats for ${run.name}:`, error);
                        run.stats = null;
                    }
                    return run;
                });

                allRuns = await Promise.all(statsPromises);

                // Calculate aggregate stats
                const stats = calculateAggregateStats(allRuns, currentRun);
                updateStats(stats);

                // Render runs
                renderRuns();
                
                document.getElementById('loading-state').style.display = 'none';
            } catch (error) {
                console.error('Failed to load runs:', error);
                document.getElementById('loading-state').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Failed to load runs: ${error.message}</p>
                    </div>
                `;
            }
        }

        function calculateAggregateStats(runs, current) {
            let totalCycles = 0;
            let totalNodes = 0;
            let activeCount = 0;

            runs.forEach(run => {
                if (run.name === current) {
                    activeCount = 1;
                }
                if (run.stats) {
                    totalCycles += run.stats.cycles || 0;
                    totalNodes += run.stats.memoryNodes || 0;
                }
            });

            return {
                total: runs.length,
                active: activeCount,
                cycles: totalCycles,
                nodes: totalNodes
            };
        }

        function updateStats(stats) {
            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-active').textContent = stats.active;
            document.getElementById('stat-cycles').textContent = stats.cycles.toLocaleString();
            document.getElementById('stat-nodes').textContent = stats.nodes.toLocaleString();
        }

        function renderRuns() {
            const activeList = document.getElementById('active-runs-list');
            const allList = document.getElementById('all-runs-list');

            // Filter for active runs
            const activeRuns = allRuns.filter(r => r.name === currentRun);
            const otherRuns = allRuns.filter(r => r.name !== currentRun);

            // Render active runs
            if (activeRuns.length > 0) {
                activeList.innerHTML = activeRuns.map(run => renderRunCard(run, true)).join('');
            } else {
                document.getElementById('active-section').style.display = 'none';
            }

            // Render all runs
            if (otherRuns.length > 0) {
                allList.innerHTML = otherRuns.map(run => renderRunCard(run, false)).join('');
            } else {
                allList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📁</div><p>No other runs found</p></div>';
            }

            // Apply filters
            applyFilters();
        }

        function renderRunCard(run, isActive) {
            const status = isActive ? 'active' : 'complete';
            const domain = run.metadata?.domain || 'Unknown domain';
            const created = run.created || 'Unknown';
            const createdDate = created !== 'Unknown' ? new Date(created).toLocaleDateString() : created;
            const stats = run.stats || {};

            return `
                <div class="run-card ${status}">
                    <div class="run-header">
                        <div class="run-title">
                            <div class="run-name">${run.name}</div>
                            <span class="status-badge ${status}">${isActive ? '🟢 Active' : '📦 Stored'}</span>
                        </div>
                    </div>
                    
                    <div class="run-meta">
                        <div class="meta-item">
                            <div class="meta-label">Domain</div>
                            <div class="meta-value">${domain.substring(0, 30)}${domain.length > 30 ? '...' : ''}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Cycles</div>
                            <div class="meta-value">${stats.cycles || 0}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Memory</div>
                            <div class="meta-value">${stats.memoryNodes || 0} nodes</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Goals</div>
                            <div class="meta-value">${(stats.goals?.completed || 0)}/${(stats.goals?.active || 0) + (stats.goals?.completed || 0)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Agents</div>
                            <div class="meta-value">${stats.agents?.completed || 0}✅ ${stats.agents?.timeout || 0}⏱️</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Reviews</div>
                            <div class="meta-value">${stats.coordinatorReviews || 0}</div>
                        </div>
                    </div>

                    ${stats.latestReview ? `
                        <div style="margin: 15px 0; padding: 10px; background: rgba(102,126,234,0.1); border-radius: 6px; font-size: 0.85em;">
                            <div style="color: #888; margin-bottom: 4px;">💡 Latest Review:</div>
                            <div style="color: #667eea;">${stats.latestReview}</div>
                        </div>
                    ` : ''}

                    <div class="run-actions">
                        ${isActive ? '<a href="/" class="btn primary">View Dashboard</a>' : '<button class="btn" onclick="switchRun(\''+run.name+'\')">Load Run</button>'}
                        <a href="/query" class="btn">Query</a>
                        <button class="btn" onclick="viewRunDetails('${run.name}')">Details</button>
                    </div>
                </div>
            `;
        }

        async function switchRun(runName) {
            if (!confirm(`Switch to run "${runName}"? This will reload the system.`)) {
                return;
            }

            try {
                const response = await fetch('/api/runs/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ runName })
                });

                const data = await response.json();

                if (data.success) {
                    alert(`Switched to run: ${runName}\n\nYou can now view it in the dashboard.`);
                    window.location.href = '/';
                } else {
                    throw new Error(data.error || 'Failed to switch run');
                }
            } catch (error) {
                alert('Error switching run: ' + error.message);
            }
        }

        function viewRunDetails(runName) {
            alert(`Run details view coming soon for: ${runName}\n\nFor now, use Query interface to explore this run's knowledge.`);
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            const sortBy = document.getElementById('sort-select').value;

            let filtered = [...allRuns];

            // Apply search
            if (searchTerm) {
                filtered = filtered.filter(run => 
                    run.name.toLowerCase().includes(searchTerm) ||
                    (run.metadata?.domain || '').toLowerCase().includes(searchTerm)
                );
            }

            // Apply status filter
            if (statusFilter !== 'all') {
                filtered = filtered.filter(run => {
                    if (statusFilter === 'active') return run.name === currentRun;
                    if (statusFilter === 'paused') return false; // TODO: implement paused state
                    if (statusFilter === 'complete') return run.name !== currentRun;
                    return true;
                });
            }

            // Apply sort
            filtered.sort((a, b) => {
                if (sortBy === 'name') {
                    return a.name.localeCompare(b.name);
                } else if (sortBy === 'cycles') {
                    return (b.metadata?.maxCycles || 0) - (a.metadata?.maxCycles || 0);
                } else { // recent
                    return (new Date(b.created || 0) - new Date(a.created || 0));
                }
            });

            // Re-render
            const allList = document.getElementById('all-runs-list');
            const otherRuns = filtered.filter(r => r.name !== currentRun);
            
            if (otherRuns.length > 0) {
                allList.innerHTML = otherRuns.map(run => renderRunCard(run, false)).join('');
            } else {
                allList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No runs match your filters</p></div>';
            }
        }

        // Event listeners
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('status-filter').addEventListener('change', applyFilters);
        document.getElementById('sort-select').addEventListener('change', applyFilters);

        // Initialize
        loadRuns();

        // Auto-refresh every 30 seconds
        setInterval(loadRuns, 30000);
    </script>
</body>
</html>
