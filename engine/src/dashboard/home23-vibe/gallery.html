<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home23 Vibe Gallery</title>
  <link rel="stylesheet" href="/home23-dashboard.css">
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(88, 166, 255, 0.12), transparent 38%),
        linear-gradient(180deg, rgba(10, 22, 40, 0.96), rgba(7, 15, 28, 1));
    }

    .h23-vg-shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .h23-vg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .h23-vg-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .h23-vg-title h1 {
      font-size: 1.8rem;
      color: #fff;
      letter-spacing: -0.03em;
    }

    .h23-vg-title p {
      color: var(--h23-text-secondary);
      font-size: 0.95rem;
    }

    .h23-vg-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .h23-vg-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(88, 166, 255, 0.24);
      background: rgba(17, 29, 51, 0.86);
      color: var(--h23-text);
      text-decoration: none;
      cursor: pointer;
      font: inherit;
    }

    .h23-vg-btn:hover {
      border-color: rgba(88, 166, 255, 0.48);
      background: rgba(26, 42, 68, 0.96);
    }

    .h23-vg-btn.primary {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(56, 189, 248, 0.95));
      color: #fff;
      border: none;
    }

    .h23-vg-meta {
      margin-bottom: 20px;
      padding: 14px 16px;
      border-radius: var(--h23-radius);
      background: rgba(17, 29, 51, 0.85);
      border: 1px solid var(--h23-border);
      color: var(--h23-text-secondary);
    }

    .h23-vg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .h23-vg-card {
      background: rgba(17, 29, 51, 0.92);
      border: 1px solid var(--h23-border);
      border-radius: var(--h23-radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .h23-vg-card:hover {
      transform: translateY(-2px);
      border-color: rgba(88, 166, 255, 0.35);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.22);
    }

    .h23-vg-card img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #07111f;
    }

    .h23-vg-card-body {
      padding: 14px;
    }

    .h23-vg-caption {
      color: var(--h23-text);
      font-size: 0.96rem;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .h23-vg-seed {
      color: var(--h23-text-secondary);
      font-size: 0.82rem;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .h23-vg-date {
      color: var(--h23-text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .h23-vg-empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--h23-text-secondary);
      background: rgba(17, 29, 51, 0.82);
      border: 1px dashed var(--h23-border);
      border-radius: var(--h23-radius);
    }

    .h23-vg-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(4, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      z-index: 9999;
    }

    .h23-vg-lightbox.open {
      display: flex;
    }

    .h23-vg-lightbox-panel {
      width: min(1100px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: rgba(10, 22, 40, 0.98);
      border: 1px solid rgba(88, 166, 255, 0.18);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
    }

    .h23-vg-lightbox-top {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 18px;
    }

    .h23-vg-lightbox img {
      width: 100%;
      border-radius: 14px;
      background: #07111f;
    }

    .h23-vg-lightbox-copy {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .h23-vg-lightbox-copy h2 {
      font-size: 1.1rem;
      color: #fff;
    }

    .h23-vg-lightbox-copy p {
      color: var(--h23-text-secondary);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .h23-vg-close {
      margin-left: auto;
      margin-bottom: 12px;
    }

    @media (max-width: 900px) {
      .h23-vg-lightbox-top {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="h23-vg-shell">
    <div class="h23-vg-header">
      <div class="h23-vg-title">
        <h1>Vibe Gallery</h1>
        <p>CHAOS MODE image history for the current Home23 agent.</p>
      </div>
      <div class="h23-vg-actions">
        <a class="h23-vg-btn" href="/home23">&larr; Dashboard</a>
      </div>
    </div>

    <div class="h23-vg-meta" id="meta-bar">Loading vibe history...</div>
    <div class="h23-vg-grid" id="gallery-grid"></div>
  </div>

  <div class="h23-vg-lightbox" id="lightbox">
    <div class="h23-vg-lightbox-panel">
      <button class="h23-vg-btn h23-vg-close" id="lightbox-close">Close</button>
      <div class="h23-vg-lightbox-top">
        <img id="lightbox-image" alt="Vibe image">
        <div class="h23-vg-lightbox-copy">
          <h2 id="lightbox-caption"></h2>
          <p id="lightbox-seed"></p>
          <p id="lightbox-prompt"></p>
          <p id="lightbox-meta"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById('gallery-grid');
    const metaBar = document.getElementById('meta-bar');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const lightboxSeed = document.getElementById('lightbox-seed');
    const lightboxPrompt = document.getElementById('lightbox-prompt');
    const lightboxMeta = document.getElementById('lightbox-meta');

    function describeHours(hours) {
      if (!Number.isFinite(hours) || hours <= 0) return '';
      return `${hours}h`;
    }

    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric',
          hour: 'numeric',
          minute: '2-digit'
        });
      } catch {
        return iso || '';
      }
    }

    function openLightbox(item) {
      lightboxImage.src = item.url;
      lightboxCaption.textContent = item.caption || 'Untitled vibe';
      lightboxSeed.textContent = [
        item.themeThought ? `Theme thought: ${item.themeThought}` : '',
        item.algorithm ? `Algorithm: ${item.algorithm}` : '',
        item.seed?.concept ? `Legacy seed: ${item.seed.concept}` : '',
        item.recentThought ? `Legacy thought tone: ${item.recentThought}` : ''
      ].filter(Boolean).join('\n\n');
      lightboxPrompt.textContent = item.prompt ? `Prompt: ${item.prompt}` : '';
      lightboxMeta.textContent = [formatDate(item.generatedAt), item.model].filter(Boolean).join(' · ');
      lightbox.classList.add('open');
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImage.src = '';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeLightbox();
    });

    async function loadGallery() {
      try {
        const res = await fetch('/home23/api/vibe/gallery', { signal: AbortSignal.timeout(10000) });
        const data = await res.json();
        const rotation = data.policy?.rotationIntervalSeconds
          ? `rotates every ${data.policy.rotationIntervalSeconds}s`
          : '';
        const cadence = data.policy?.autoGenerate
          ? `auto-generates at most every ${describeHours(data.policy.generationIntervalHours)}`
          : '';
        metaBar.textContent = [
          `${data.total} image${data.total === 1 ? '' : 's'} stored`,
          rotation,
          cadence,
          data.generating ? 'generation in progress' : ''
        ].filter(Boolean).join(' · ');

        if (!data.images || data.images.length === 0) {
          grid.innerHTML = '<div class="h23-vg-empty">No vibe images yet. Open the dashboard Home tab to let the Vibe tile seed the gallery.</div>';
          return;
        }

        grid.innerHTML = data.images.map((item, index) => `
          <article class="h23-vg-card" data-index="${index}">
            <img src="${item.url}" alt="Vibe image ${index + 1}" loading="lazy">
            <div class="h23-vg-card-body">
              <div class="h23-vg-caption">${item.caption || 'Untitled vibe'}</div>
              <div class="h23-vg-seed">${item.themeThought || item.seed?.concept || ''}</div>
              <div class="h23-vg-date">${formatDate(item.generatedAt)}</div>
            </div>
          </article>
        `).join('');

        grid.querySelectorAll('.h23-vg-card').forEach((card) => {
          card.addEventListener('click', () => {
            const item = data.images[Number(card.dataset.index)];
            if (item) openLightbox(item);
          });
        });
      } catch (error) {
        grid.innerHTML = `<div class="h23-vg-empty">Failed to load gallery: ${error.message}</div>`;
      }
    }

    loadGallery();
  </script>
</body>
</html>
