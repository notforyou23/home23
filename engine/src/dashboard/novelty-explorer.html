<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novelty Explorer - Phase 2B</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1f 0%, #1a1a3f 100%);
            color: #e0e0ff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0a0ff;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(30, 30, 60, 0.6);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #4a90ff, #00d4ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 144, 255, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(30, 30, 60, 0.7);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid rgba(0, 255, 255, 0.2);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ffff;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #a0a0ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .insights-grid {
            display: grid;
            gap: 20px;
        }

        .insight-card {
            background: rgba(30, 30, 60, 0.8);
            border-radius: 12px;
            padding: 25px;
            border: 2px solid rgba(100, 100, 200, 0.3);
            transition: all 0.3s;
            cursor: pointer;
        }

        .insight-card:hover {
            border-color: rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.2);
        }

        .insight-card.escalated {
            border: 3px solid #ff4500;
            background: rgba(60, 30, 30, 0.8);
        }

        .insight-card.novel {
            border: 2px solid #00ff00;
        }

        .insight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .novelty-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-escalated {
            background: linear-gradient(135deg, #ff4500, #ff6347);
            color: white;
            animation: pulse 2s infinite;
        }

        .badge-novel {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #002200;
        }

        .badge-partial {
            background: linear-gradient(135deg, #ffa500, #ff8c00);
            color: white;
        }

        .badge-low {
            background: rgba(100, 100, 120, 0.5);
            color: #c0c0d0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .novelty-score {
            font-size: 2rem;
            font-weight: bold;
            color: #00ffff;
        }

        .insight-content {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e0e0ff;
            margin-bottom: 15px;
        }

        .validation-tests {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .test-result {
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .test-result.passed {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
        }

        .test-result.failed {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
        }

        .test-icon {
            font-size: 1.2rem;
        }

        .test-label {
            flex: 1;
        }

        .metadata {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #9090c0;
        }

        .metadata-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px;
        }

        .details-modal.show {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .details-content {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 16px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            border: 2px solid rgba(0, 255, 255, 0.3);
        }

        .details-header {
            margin-bottom: 30px;
        }

        .details-section {
            margin-bottom: 25px;
        }

        .details-section h3 {
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .details-section pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            color: #d0d0ff;
            line-height: 1.5;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 50, 50, 0.8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.3rem;
            color: #00ffff;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: rgba(255, 50, 50, 0.2);
            border: 2px solid #ff4500;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            background: rgba(50, 50, 80, 0.6);
            border: 1px solid rgba(100, 100, 200, 0.3);
            color: #a0a0ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: rgba(74, 144, 255, 0.3);
            border-color: #00ffff;
            color: #00ffff;
        }

        .tab-btn:hover {
            border-color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 Novelty Explorer</h1>
            <p class="subtitle">Validated Novel Insights from Autonomous Cognition</p>
        </header>

        <div class="controls">
            <div>
                <button class="btn" onclick="loadNovelInsights()">🔄 Refresh & Validate</button>
                <button class="btn" onclick="window.location.href='/'">← Back to Dashboard</button>
            </div>
            <div class="metadata-item">
                <span>Last Updated:</span>
                <span id="last-update">Never</span>
            </div>
        </div>

        <div class="stats-cards" id="stats-cards">
            <!-- Stats populated by JS -->
        </div>

        <div class="category-tabs" id="category-tabs">
            <button class="tab-btn active" onclick="showCategory('all')">All</button>
            <button class="tab-btn" onclick="showCategory('escalated')">⭐ Escalated</button>
            <button class="tab-btn" onclick="showCategory('novel')">✨ Novel Candidates</button>
            <button class="tab-btn" onclick="showCategory('partial')">🔸 Partial Novelty</button>
            <button class="tab-btn" onclick="showCategory('low')">📋 Low Novelty</button>
        </div>

        <div id="content">
            <div class="loading">Loading novelty analysis</div>
        </div>
    </div>

    <div class="details-modal" id="details-modal">
        <div class="details-content" id="details-content">
            <button class="close-btn" onclick="closeDetails()">✕ Close</button>
            <!-- Details populated by JS -->
        </div>
    </div>

    <script>
        let currentData = null;
        let currentCategory = 'all';

        // Load on page load - SIMPLIFIED: Just show regular insights first
        window.addEventListener('DOMContentLoaded', () => {
            loadInsightsQuick();
        });

        // Quick load: Show insights without validation (fast)
        async function loadInsightsQuick() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Loading insights</div>';

            try {
                console.log('Fetching insights (no validation yet)...');
                
                // Get regular insights first (fast - no validation)
                const response = await fetch('/api/insights/analyze?limit=20');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const insights = await response.json();
                
                console.log('Insights loaded:', insights.stats);
                
                // Show them without validation
                renderQuickInsights(insights);
                
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error loading insights:', error);
                content.innerHTML = `<div class="error">
                    <h3>⚠️ Error Loading Insights</h3>
                    <p>${error.message}</p>
                    <button class="btn" onclick="loadInsightsQuick()" style="margin-top: 15px;">Retry</button>
                </div>`;
            }
        }

        // Full validation (heavy - only on button click)
        async function loadNovelInsights() {
            const content = document.getElementById('content');
            const btn = event?.target;
            
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Validating... (30-60s)';
            }
            
            content.innerHTML = '<div class="loading">Running 4-test validation on insights (this takes 30-60 seconds)</div>';

            try {
                console.log('Starting full novelty validation...');
                const startTime = Date.now();
                
                const response = await fetch('/api/insights/validate-novelty?limit=10');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                
                console.log(`Validation complete in ${elapsed}s`, data.stats);
                
                currentData = data;
                
                renderStats(data.stats);
                renderInsights(data.ranked);
                
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Novelty validation error:', error);
                content.innerHTML = `<div class="error">
                    <h3>⚠️ Validation Failed</h3>
                    <p>${error.message}</p>
                    <p>The validation is intensive. Try reducing the limit or check console.</p>
                    <button class="btn" onclick="loadInsightsQuick()" style="margin-top: 15px;">Load Without Validation</button>
                </div>`;
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '🔄 Refresh & Validate';
                }
            }
        }

        // Render insights quickly without validation
        function renderQuickInsights(insights) {
            const statsHtml = `
                <div class="stat-card">
                    <span class="stat-number">${insights.stats?.totalInsights || 0}</span>
                    <span class="stat-label">Total Insights</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number">⏳</span>
                    <span class="stat-label">Click Validate</span>
                </div>
            `;
            
            document.getElementById('stats-cards').innerHTML = statsHtml;
            
            // Show message to run validation
            const content = document.getElementById('content');
            content.innerHTML = `
                <div style="text-align: center; padding: 40px; background: rgba(30,30,60,0.6); border-radius: 12px;">
                    <h2 style="color: #00ffff; margin-bottom: 20px;">✅ ${insights.stats?.totalInsights || 0} Insights Ready</h2>
                    <p style="margin-bottom: 25px; color: #a0a0ff;">
                        Click the button above to run the 4-test novelty validation.<br>
                        This will take 30-60 seconds as it validates each insight.
                    </p>
                    <div style="font-size: 0.9rem; color: #8080c0; margin-top: 20px;">
                        <p><strong>What gets validated:</strong></p>
                        <p>• Agent insights (${insights.agentBreakthroughs?.length || 0} from specialist agents)</p>
                        <p>• Strategic insights (${insights.strategicInsights?.length || 0} from coordinator)</p>
                        <p>• High-surprise thoughts (${insights.highSurpriseThoughts?.length || 0} autonomous)</p>
                    </div>
                </div>
            `;
        }

        function renderStats(stats) {
            const statsHtml = `
                <div class="stat-card">
                    <span class="stat-number">${stats.escalated || 0}</span>
                    <span class="stat-label">Escalated</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number">${stats.novelCandidates || 0}</span>
                    <span class="stat-label">Novel Candidates</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number">${stats.partial || 0}</span>
                    <span class="stat-label">Partial Novelty</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number">${stats.total || 0}</span>
                    <span class="stat-label">Total Validated</span>
                </div>
            `;
            
            document.getElementById('stats-cards').innerHTML = statsHtml;
        }

        function renderInsights(ranked) {
            const content = document.getElementById('content');
            const insights = getAllInsights(ranked);
            
            if (insights.length === 0) {
                content.innerHTML = '<div class="loading">No insights available yet</div>';
                return;
            }

            const html = insights
                .filter(i => filterByCategory(i))
                .map(insight => renderInsightCard(insight))
                .join('');
            
            content.innerHTML = `<div class="insights-grid">${html}</div>`;
        }

        function getAllInsights(ranked) {
            return [
                ...ranked.escalated.map(i => ({ ...i, _category: 'escalated' })),
                ...ranked.novelCandidates.map(i => ({ ...i, _category: 'novel' })),
                ...ranked.partialNovelty.map(i => ({ ...i, _category: 'partial' })),
                ...ranked.lowNovelty.map(i => ({ ...i, _category: 'low' }))
            ];
        }

        function filterByCategory(insight) {
            if (currentCategory === 'all') return true;
            return insight._category === currentCategory;
        }

        function showCategory(category) {
            currentCategory = category;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Re-render
            if (currentData) {
                renderInsights(currentData.ranked);
            }
        }

        function renderInsightCard(insight) {
            const validation = insight.validation || {};
            const noveltyScore = validation.noveltyScore || 0;
            const escalate = validation.escalate;
            const isNovel = validation.isNovelCandidate;
            
            const badgeClass = escalate ? 'badge-escalated' : 
                              isNovel ? 'badge-novel' : 
                              noveltyScore > 50 ? 'badge-partial' : 'badge-low';
            
            const badgeText = escalate ? '⭐ ESCALATE' : 
                             isNovel ? '✨ NOVEL' : 
                             noveltyScore > 50 ? '🔸 PARTIAL' : '📋 STANDARD';
            
            const cardClass = escalate ? 'escalated' : isNovel ? 'novel' : '';
            
            const content = insight.content || insight.thought || 'No content';
            const category = insight.category || 'Unknown';
            const agentType = insight.agentType || '';
            
            return `
                <div class="insight-card ${cardClass}" onclick='showDetails(${JSON.stringify(insight).replace(/'/g, "&#39;")})'>
                    <div class="insight-header">
                        <span class="novelty-badge ${badgeClass}">${badgeText}</span>
                        <span class="novelty-score">${noveltyScore}</span>
                    </div>
                    
                    <div class="insight-content">
                        ${content.substring(0, 300)}${content.length > 300 ? '...' : ''}
                    </div>
                    
                    <div class="validation-tests">
                        ${renderTest('Provenance', validation.provenanceClean)}
                        ${renderTest('Reproducible', validation.reproducible)}
                        ${renderTest('Embedding Novel', validation.embeddingNovel)}
                        ${renderTest('High Density', validation.highIdeaDensity)}
                    </div>
                    
                    <div class="metadata">
                        <span class="metadata-item">📂 ${category}</span>
                        ${agentType ? `<span class="metadata-item">🤖 ${agentType}</span>` : ''}
                        ${insight.cycle ? `<span class="metadata-item">🔄 Cycle ${insight.cycle}</span>` : ''}
                        <span class="metadata-item">📊 Confidence ${validation.confidence || 0}%</span>
                    </div>
                </div>
            `;
        }

        function renderTest(label, result) {
            if (!result) return `<div class="test-result"><span class="test-label">${label}: Unknown</span></div>`;
            
            const passed = result.passed;
            const icon = passed ? '✅' : '❌';
            const cssClass = passed ? 'passed' : 'failed';
            const reason = result.reason || '';
            
            return `
                <div class="test-result ${cssClass}">
                    <span class="test-icon">${icon}</span>
                    <span class="test-label">${label}</span>
                </div>
            `;
        }

        function showDetails(insight) {
            const modal = document.getElementById('details-modal');
            const content = document.getElementById('details-content');
            
            const validation = insight.validation || {};
            const details = validation.details || {};
            
            const detailsHtml = `
                <button class="close-btn" onclick="closeDetails()">✕ Close</button>
                
                <div class="details-header">
                    <h2>Insight Validation Details</h2>
                    <div class="metadata">
                        <span>Novelty Score: ${validation.noveltyScore || 0}/100</span>
                        <span>Confidence: ${validation.confidence || 0}%</span>
                    </div>
                </div>
                
                <div class="details-section">
                    <h3>Content</h3>
                    <pre>${insight.content || insight.thought || 'No content'}</pre>
                </div>
                
                <div class="details-section">
                    <h3>Test Results</h3>
                    
                    <h4>1. Provenance Check ${validation.provenanceClean?.passed ? '✅' : '❌'}</h4>
                    <p>${validation.provenanceClean?.reason || 'Not run'}</p>
                    ${details.provenance ? `<pre>${JSON.stringify(details.provenance, null, 2)}</pre>` : ''}
                    
                    <h4>2. Reproducibility ${validation.reproducible?.passed ? '✅' : '❌'}</h4>
                    <p>${validation.reproducible?.reason || 'Not run'}</p>
                    ${details.reproducibility ? `<pre>${JSON.stringify(details.reproducibility, null, 2)}</pre>` : ''}
                    
                    <h4>3. Embedding Novelty ${validation.embeddingNovel?.passed ? '✅' : '❌'}</h4>
                    <p>${validation.embeddingNovel?.reason || 'Not run'}</p>
                    ${details.embedding ? `<pre>${JSON.stringify(details.embedding, null, 2)}</pre>` : ''}
                    
                    <h4>4. Idea Density ${validation.highIdeaDensity?.passed ? '✅' : '❌'}</h4>
                    <p>${validation.highIdeaDensity?.reason || 'Not run'}</p>
                    ${details.ideaDensity ? `<pre>${JSON.stringify(details.ideaDensity, null, 2)}</pre>` : ''}
                </div>
                
                <div class="details-section">
                    <h3>Decision</h3>
                    <p><strong>Novel Candidate:</strong> ${validation.isNovelCandidate ? 'YES ✅' : 'NO ❌'}</p>
                    <p><strong>Escalate:</strong> ${validation.escalate ? 'YES ⭐' : 'NO'}</p>
                    <p><em>${validation.isNovelCandidate ? 
                      'All 4 tests passed - this is a candidate for emergent novelty' : 
                      'Some tests failed - likely retrieval, recombination, or low-value'}</em></p>
                </div>
                
                <div class="details-section">
                    <h3>Metadata</h3>
                    <pre>${JSON.stringify({
                        category: insight.category,
                        agentType: insight.agentType,
                        cycle: insight.cycle,
                        timestamp: insight.timestamp,
                        sources: insight.sources?.length || 0
                    }, null, 2)}</pre>
                </div>
            `;
            
            content.innerHTML = detailsHtml;
            modal.classList.add('show');
        }

        function closeDetails() {
            document.getElementById('details-modal').classList.remove('show');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetails();
            if (e.key === 'r' && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                loadNovelInsights();
            }
        });
    </script>
</body>
</html>
